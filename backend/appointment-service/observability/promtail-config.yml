server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: appointment-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: appointment-service
          __path__: /var/log/appointment-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: log.level
            logger: log.logger
            message: message
            timestamp: '"@timestamp"'
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
