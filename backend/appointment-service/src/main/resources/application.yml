spring:
  application:
    name: AppointmentApplication

  datasource:
    url: jdbc:h2:file:../data/appointment-db;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
    hikari:
      pool-name: AppointmentHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 900000
      validation-timeout: 2000
      leak-detection-threshold: 30000

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: http://localhost:8081

logging:
  file:
    name: logs/appointment-service.log
  structured:
    format:
      file: ecs

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  paths-to-match: /api/**
  packages-to-scan: com.appointment.adapters.in.controller

response:
  error-messages:
    invalid-cpf: It's not possible create a appointment with invalid CPF. Try again
    appointment-with-invalid-date: It's not possible create a appointment with invalid date. Try again

appointment:
  kafka:
    topic: appointment-events-topic

resilience4j:
  circuitbreaker:
    instances:
      appointmentEventProducer:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 1s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true