name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch: {}

defaults:
  run:
    working-directory: backend/appointment-service

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: backend/appointment-service/pom.xml

      - name: Build application jar
        run: ./mvnw -B clean package -DskipTests

      - name: Build Docker image
        run: docker build -t appointment-service:${{ env.DEPLOY_SHA }} .

      - name: Deploy
        run: |
          echo "Deploy step placeholder — no real deployment is configured yet."
          echo "Build artifact and Docker image (appointment-service:${{ env.DEPLOY_SHA }}) are ready."
          echo "Pipeline finished successfully."
