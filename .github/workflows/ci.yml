name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: backend/appointment-service

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, test and coverage gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: backend/appointment-service/pom.xml

      - name: Build, run tests and check coverage (90% minimum)
        run: ./mvnw -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/appointment-service/target/surefire-reports
            backend/appointment-service/target/site/jacoco
          retention-days: 7
